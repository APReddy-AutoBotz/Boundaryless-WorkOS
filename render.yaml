services:
  - type: web
    name: boundaryless-rut
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: APP_MODE
        value: production
      - key: DISABLE_DEMO_FALLBACK
        value: "true"
      - key: PGSSLMODE
        value: require
      - key: LOGIN_RATE_LIMIT
        value: "8"
      - key: AUTO_MIGRATE
        value: "true"
      - key: AUTO_SEED_DEMO
        value: "false"
      - key: DEMO_SEED_PASSWORD
        value: demo123
      - key: DATABASE_URL
        sync: false
      - key: API_SESSION_SECRET
        sync: false
      - key: APP_URL
        sync: false
